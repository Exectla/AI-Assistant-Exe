<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A.B.D. — Advanced Brain Understanding</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Abîme de Coruscant : flux de trafic lointains (shader WebGL) -->
  <canvas id="bg-canvas" class="bg-canvas" aria-hidden="true"></canvas>

  <!-- Séquence d'allumage -->
  <section id="boot" class="boot" aria-hidden="true">
    <div class="boot__line"></div>
    <div class="boot__letters">
      <span class="boot__letter boot__letter--a">A.</span>
      <span class="boot__letter boot__letter--b">B.</span>
      <span class="boot__letter boot__letter--d">D.</span>
    </div>
  </section>

  <!-- Interface principale -->
  <main id="app" class="app">
    <header class="app__header">
      <h1 class="app__title">A.B.D.</h1>
      <p class="app__subtitle">Advanced Brain Understanding</p>
    </header>

    <!-- Orbe holographique : présence et état du noyau -->
    <div class="app__presence">
      <div id="orb" class="orb" data-state="connecting" aria-hidden="true">
        <canvas id="orb-canvas" class="orb__canvas"></canvas>
        <div class="orb__core"></div>
        <div class="orb__halo"></div>
      </div>
      <p id="status" class="app__status" role="status"></p>
    </div>

    <section class="app__conversation" id="conversation" aria-live="polite"></section>

    <footer class="app__controls">
      <button id="mic-button" class="control control--mic" type="button" aria-label="Parler à A.B.D.">
        <span class="control__ring"></span>
        <span class="control__label">Parler</span>
      </button>

      <form id="chat-form" class="control control--form">
        <input id="chat-input" class="control__input" type="text"
               placeholder="Écrivez à A.B.D…" autocomplete="off" />
        <button id="send-button" class="control__send" type="submit" aria-label="Envoyer">→</button>
      </form>
    </footer>
  </main>

  <!-- Ordinateur spatial (déployé par le signe V ou la touche V) -->
  <div id="hud" class="hud" hidden>
    <div class="hud__frame"></div>
    <canvas id="graph-canvas" class="hud__graph"></canvas>

    <div class="hud__module hud__module--tl">
      <span class="hud__module-title">Noyau</span>
      <span id="hud-kernel">—</span>
    </div>
    <div class="hud__module hud__module--tr">
      <span class="hud__module-title">Heure</span>
      <span id="hud-clock">—</span>
    </div>
    <div class="hud__module hud__module--bl">
      <span class="hud__module-title">Voix</span>
      <span>Henri · Neural</span>
      <span class="hud__module-title">Vision</span>
      <span id="hud-vision">clavier (touche V)</span>
    </div>
    <div class="hud__module hud__module--br">
      <span class="hud__module-title">Fermer</span>
      <span>Signe V · touche V</span>
    </div>

    <!-- Panneau de lecture Liquid Glass (ouvert par pince sur un nœud) -->
    <aside id="reader" class="reader" hidden>
      <header class="reader__header">
        <span id="reader-title" class="reader__title">—</span>
        <button id="reader-close" class="reader__close" type="button"
                aria-label="Fermer le document">✕</button>
      </header>
      <div id="reader-body" class="reader__body"></div>
      <div id="reader-answer" class="reader__answers"></div>
      <form id="reader-form" class="reader__form">
        <input id="reader-input" class="reader__input" type="text"
               placeholder="Interrogez ce document (ou parlez)…" autocomplete="off" />
        <button class="reader__send" type="submit" aria-label="Envoyer">→</button>
      </form>
    </aside>

    <div id="spatial-cursor" class="hud__cursor"></div>
  </div>

  <!-- Protocole de scan biométrique (🖐 main ouverte ou touche B) -->
  <div id="scan" class="scan" hidden>
    <div id="scan-feed-left" class="scan__feed scan__feed--left"></div>
    <div class="scan__center">
      <div class="scan__viewport">
        <img id="scan-video" class="scan__video" alt="" />
        <canvas id="scan-mesh" class="scan__mesh"></canvas>
        <div class="scan__tint"></div>
        <div class="scan__sweep"></div>
      </div>
      <p class="scan__caption">Protocole de scan biométrique · A.B.D.</p>
    </div>
    <div id="scan-feed-right" class="scan__feed scan__feed--right"></div>
  </div>

  <!-- Shadow Workspace : brouillon éphémère (☝ index levé ou touche W) -->
  <aside id="shadow" class="shadow" hidden>
    <header class="shadow__header">
      <span class="shadow__title">Shadow Workspace</span>
      <span class="shadow__badge">éphémère · mémoire vive</span>
    </header>
    <div id="shadow-lines" class="shadow__lines"></div>
    <footer class="shadow__footer">
      <span id="shadow-status" class="shadow__status">micro en veille</span>
      <button id="shadow-export" class="shadow__export" type="button">
        Exporter ⟶ .md
      </button>
    </footer>
  </aside>

  <!-- Poussière holographique de premier plan -->
  <canvas id="dust-canvas" class="dust-canvas" aria-hidden="true"></canvas>

  <script src="visuals.js"></script>
  <script src="hud.js"></script>
  <script src="scan.js"></script>
  <script src="shadow.js"></script>
  <script src="app.js"></script>
</body>
</html>
